name: Forge
options:
  bundleIdPrefix: com.eddmann.forge
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  # JavaScript/Python/CSS/YAML are pinned below v0.25 because v0.25 switched to a runtime
  # `FileManager.fileExists("src/scanner.c")` check that returns false during Xcode SPM
  # manifest evaluation, silently dropping the external scanner (link errors). Other grammars
  # are on latest tags. Swift uses alex-pinkus's `with-generated-files` branch because the
  # grammar's `src/parser.c` is generated, not committed to `main`.
  SwiftTreeSitter:    { url: https://github.com/tree-sitter/swift-tree-sitter,         from: 0.10.0 }
  TreeSitterSwift:    { url: https://github.com/alex-pinkus/tree-sitter-swift,         branch: with-generated-files }
  TreeSitterTypeScript: { url: https://github.com/tree-sitter/tree-sitter-typescript,  exactVersion: 0.23.2 }
  TreeSitterJavaScript: { url: https://github.com/tree-sitter/tree-sitter-javascript,  exactVersion: 0.23.1 }
  TreeSitterPython:   { url: https://github.com/tree-sitter/tree-sitter-python,        exactVersion: 0.23.6 }
  TreeSitterGo:       { url: https://github.com/tree-sitter/tree-sitter-go,            exactVersion: 0.25.0 }
  TreeSitterRust:     { url: https://github.com/tree-sitter/tree-sitter-rust,          exactVersion: 0.24.2 }
  TreeSitterJSON:     { url: https://github.com/tree-sitter/tree-sitter-json,          exactVersion: 0.24.8 }
  TreeSitterYAML:     { url: https://github.com/tree-sitter-grammars/tree-sitter-yaml, exactVersion: 0.7.0 }
  TreeSitterHTML:     { url: https://github.com/tree-sitter/tree-sitter-html,          exactVersion: 0.23.2 }
  TreeSitterCSS:      { url: https://github.com/tree-sitter/tree-sitter-css,           exactVersion: 0.23.2 }
  TreeSitterMarkdown: { url: https://github.com/MDeiml/tree-sitter-markdown,           exactVersion: 0.5.3 }
  TreeSitterBash:     { url: https://github.com/tree-sitter/tree-sitter-bash,          exactVersion: 0.25.1 }
  TreeSitterPHP:      { url: https://github.com/tree-sitter/tree-sitter-php,           exactVersion: 0.24.2 }

targets:
  Forge:
    type: application
    platform: macOS
    sources:
      - path: Forge
        excludes:
          - "*.entitlements"
          - Resources/ghostty
          - Resources/pokemon-sprites
      - path: Forge/Integrations/Ghostty/ghostty.h
        buildPhase: none
      - path: Forge/Resources/ghostty
        buildPhase: resources
        type: folder
      - path: Forge/Resources/pokemon-sprites
        buildPhase: resources
        type: folder
    info:
      path: Forge/Info.plist
      properties:
        NSPrincipalClass: NSApplication
    entitlements:
      path: Forge/Forge.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-unsigned-executable-memory: true
    dependencies:
      - framework: Dependencies/GhosttyKit.xcframework/macos-arm64_x86_64/libghostty.a
        embed: false
      - target: forge-cli
      - package: SwiftTreeSitter
      - package: SwiftTreeSitter
        product: SwiftTreeSitterLayer
      - package: TreeSitterSwift
      - package: TreeSitterTypeScript
      - package: TreeSitterJavaScript
      - package: TreeSitterPython
      - package: TreeSitterGo
      - package: TreeSitterRust
      - package: TreeSitterJSON
      - package: TreeSitterYAML
      - package: TreeSitterHTML
      - package: TreeSitterCSS
      - package: TreeSitterMarkdown
      - package: TreeSitterBash
      - package: TreeSitterPHP
    postBuildScripts:
      - script: |
          mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin"
          cp "${BUILT_PRODUCTS_DIR}/forge" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/bin/forge"
        name: "Embed forge CLI"
        inputFiles: ["$(BUILT_PRODUCTS_DIR)/forge"]
        outputFiles: ["$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/forge"]
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.eddmann.forge
        PRODUCT_NAME: Forge
        SWIFT_VERSION: "5.10"
        CODE_SIGN_ENTITLEMENTS: Forge/Forge.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_APP_SANDBOX: "NO"
        INFOPLIST_FILE: Forge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Forge/Forge-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)"
          - "$(SRCROOT)/Dependencies/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/Dependencies/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lz"
          - "-lc++"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework CoreGraphics"
          - "-framework QuartzCore"
          - "-framework Foundation"
          - "-framework AppKit"
          - "-framework Carbon"
          - "-framework IOKit"
          - "-framework IOSurface"
          - "-framework UniformTypeIdentifiers"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          PRODUCT_BUNDLE_IDENTIFIER: com.eddmann.forge.dev
          PRODUCT_NAME: Forge Dev
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  forge-cli:
    type: tool
    platform: macOS
    sources:
      - path: Tools/forge
    settings:
      base:
        PRODUCT_NAME: forge
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
